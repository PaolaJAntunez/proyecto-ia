<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Chat de Texto</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #fafafa; }
        .mensaje { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #e3f2fd; color: #1565c0; text-align: right; }
        .ai { background: #e8f5e9; color: #2e7d32; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>NexusAI - Texto</h2>
    <div id="chat"></div>
    <textarea id="prompt" placeholder="Escribe tu consulta aquí..."></textarea>
    <button onclick="enviar()">Enviar Mensaje</button>
</div>

<script src="script.js"></script>
</body>
</html>
